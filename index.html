<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DPBL – Go 82-0</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=IBM+Plex+Mono:wght@400;600&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3d;
    --accent: #f5c518;
    --accent2: #e8501a;
    --green: #1db954;
    --red: #e83a3a;
    --text: #e8e8f0;
    --muted: #7070a0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .scanlines {
    position: fixed; inset: 0; pointer-events: none; z-index: 999;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
  }

  header {
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
    border-bottom: 2px solid var(--border);
    position: relative;
  }

  header::before {
    content: '';
    position: absolute;
    bottom: -2px; left: 50%; transform: translateX(-50%);
    width: 200px; height: 2px;
    background: var(--accent);
  }

  .league-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 8vw, 5rem);
    letter-spacing: 0.12em;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(245,197,24,0.3);
    line-height: 1;
  }

  .subtitle {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    margin-top: 0.4rem;
    text-transform: uppercase;
  }

  .game-wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1rem 4rem;
  }

  /* Slot machine */
  .slot-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2rem;
    margin-bottom: 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .slot-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent2));
  }

  .spin-label {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .slot-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    letter-spacing: 0.05em;
    color: var(--accent);
    min-height: 4rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    transition: opacity 0.15s;
  }

  .slot-display.spinning {
    animation: flicker 0.08s linear infinite;
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .slot-decade { color: var(--accent2); }
  .slot-team { color: var(--accent); }

  .spin-btn {
    margin-top: 1.5rem;
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.9rem 2.5rem;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .spin-btn:hover { background: #ffd84a; transform: translateY(-1px); }
  .spin-btn:active { transform: translateY(0); }
  .spin-btn:disabled { background: var(--muted); cursor: default; transform: none; }

  .rounds-left {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 1rem;
    letter-spacing: 0.2em;
  }

  /* Player picker */
  .picker-section {
    display: none;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.5rem;
    margin-bottom: 2rem;
  }

  .picker-section.active { display: block; }

  .picker-header {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 1.2rem;
  }

  .position-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    color: var(--accent2);
    margin-bottom: 0.3rem;
  }

  .player-grid {
    display: grid;
    gap: 0.6rem;
    max-height: 320px;
    overflow-y: auto;
    padding-right: 0.3rem;
  }

  .player-grid::-webkit-scrollbar { width: 4px; }
  .player-grid::-webkit-scrollbar-track { background: var(--border); }
  .player-grid::-webkit-scrollbar-thumb { background: var(--accent); }

  .player-card {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.75rem 1rem;
    cursor: pointer;
    transition: all 0.1s;
    gap: 0.5rem;
  }

  .player-card:hover {
    border-color: var(--accent);
    background: rgba(245,197,24,0.05);
    transform: translateX(3px);
  }

  .player-name {
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--text);
  }

  .player-pos {
    font-size: 0.65rem;
    color: var(--accent2);
    letter-spacing: 0.1em;
    margin-bottom: 0.25rem;
  }

  .player-stats {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .stat-highlight { color: var(--accent); font-weight: 600; }

  .pick-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.4rem 0.8rem;
    cursor: pointer;
    border-radius: 2px;
    white-space: nowrap;
    transition: all 0.1s;
    flex-shrink: 0;
  }

  .pick-btn:hover { background: var(--accent); color: #000; }

  /* Roster display */
  .roster-section {
    margin-bottom: 2rem;
  }

  .roster-title {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .roster-slots {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.75rem;
  }

  @media (max-width: 600px) {
    .roster-slots { grid-template-columns: repeat(2, 1fr); }
  }

  .roster-slot {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1rem 0.75rem;
    text-align: center;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .roster-slot.filled {
    border-color: rgba(245,197,24,0.3);
    background: linear-gradient(135deg, var(--card), rgba(245,197,24,0.04));
  }

  .roster-slot.active-slot {
    border-color: var(--accent2);
    animation: pulse-border 1.5s ease-in-out infinite;
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 0 0 rgba(232,80,26,0.4); }
    50% { box-shadow: 0 0 0 4px rgba(232,80,26,0); }
  }

  .slot-pos-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }

  .slot-pos-label.filled { color: var(--accent2); }

  .slot-player-name {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    line-height: 1.3;
    margin-bottom: 0.3rem;
  }

  .slot-player-meta {
    font-size: 0.58rem;
    color: var(--muted);
    text-align: center;
  }

  .slot-empty-text {
    font-size: 0.6rem;
    color: var(--border);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* Simulate button */
  .simulate-btn {
    display: block;
    width: 100%;
    background: linear-gradient(135deg, var(--accent2), #c43a10);
    color: #fff;
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.2em;
    padding: 1.2rem;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
    margin-top: 1rem;
  }

  .simulate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(232,80,26,0.4); }
  .simulate-btn:disabled { background: var(--muted); cursor: default; transform: none; box-shadow: none; }

  /* Result modal */
  .result-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .result-overlay.active { display: flex; }

  .result-modal {
    background: var(--card);
    border: 2px solid var(--accent);
    border-radius: 6px;
    padding: 3rem 2.5rem;
    max-width: 500px;
    width: 100%;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .result-modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent2));
  }

  .result-record {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 15vw, 7rem);
    line-height: 1;
    letter-spacing: 0.05em;
  }

  .result-record.perfect { color: var(--green); text-shadow: 0 0 60px rgba(29,185,84,0.5); }
  .result-record.good { color: var(--accent); }
  .result-record.bad { color: var(--red); }

  .result-message {
    font-size: 0.85rem;
    color: var(--muted);
    margin: 1rem 0 2rem;
    letter-spacing: 0.1em;
    line-height: 1.6;
  }

  .result-team {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
    gap: 0.4rem;
    margin-bottom: 2rem;
    font-size: 0.6rem;
  }

  .result-player {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0.5rem 0.3rem;
    color: var(--muted);
  }

  .result-player .name { color: var(--text); font-size: 0.62rem; margin-bottom: 0.2rem; }
  .result-player .pos-label { color: var(--accent2); font-size: 0.55rem; }

  .play-again-btn {
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 1rem 2.5rem;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .play-again-btn:hover { background: #ffd84a; }

  /* Stat bars */
  .sim-stats {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    text-align: left;
  }

  .stat-bar-row {
    display: grid;
    grid-template-columns: 50px 1fr 40px;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.65rem;
  }

  .stat-bar-label { color: var(--muted); letter-spacing: 0.1em; }

  .stat-bar-track {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .stat-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.8s cubic-bezier(0.2, 0, 0, 1) 0.3s;
  }

  .stat-bar-fill.ok { background: var(--green); }
  .stat-bar-fill.warn { background: var(--accent); }
  .stat-bar-fill.fail { background: var(--red); }

  .stat-bar-val { color: var(--text); text-align: right; font-weight: 600; }

  /* confetti particles */
  .confetti-container {
    position: fixed; inset: 0; pointer-events: none; z-index: 200;
  }

  .confetti-piece {
    position: absolute;
    width: 8px; height: 8px;
    top: -10px;
    animation: fall linear forwards;
  }

  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>

</div>

<div class="confetti-container" id="confettiContainer"></div>

// Pre-build index: decade+team -> players
const COMBO_INDEX = {};
ALL_PLAYERS.forEach(p => {
  const key = p.decade + '||' + p.team;
  if (!COMBO_INDEX[key]) COMBO_INDEX[key] = [];
  COMBO_INDEX[key].push(p);
});
const ALL_COMBOS = Object.keys(COMBO_INDEX).filter(k => COMBO_INDEX[k].length >= 1);

// ---- GAME STATE ----
let state = {
  round: 0,         // 0-4
  picks: [],        // array of {pos, player}
  currentCombo: null,
  spinning: false,
  done: false,
};

const POS_ORDER = ['PG','SG','SF','PF','C'];

function getNeededPos() {
  const filled = state.picks.map(p => p.pos);
  return POS_ORDER.filter(p => !filled.includes(p));
}

function getAvailablePos(players) {
  const needed = getNeededPos();
  // Each player card will show which position slots they can fill
  return needed;
}

// ---- INIT ----
function initRoster() {
  const slots = document.getElementById('rosterSlots');
  slots.innerHTML = POS_ORDER.map((pos, i) => `
    <div class="roster-slot" id="rslot-${pos}">
      <div class="slot-pos-label" id="rslot-pos-${pos}">${pos}</div>
      <div class="slot-empty-text">Empty</div>
    </div>
  `).join('');
}

function updateRoster() {
  POS_ORDER.forEach(pos => {
    const slot = document.getElementById(`rslot-${pos}`);
    const pick = state.picks.find(p => p.pos === pos);
    if (pick) {
      slot.classList.add('filled');
      slot.classList.remove('active-slot');
      slot.innerHTML = `
        <div class="slot-pos-label filled">${pos}</div>
        <div class="slot-player-name">${pick.player.name}</div>
        <div class="slot-player-meta">${pick.player.decade} ${pick.player.team}</div>
        <div class="slot-player-meta" style="margin-top:0.2rem">${pick.player.PPG}pts · ${pick.player.RPG}reb · ${pick.player.APG}ast</div>
      `;
    } else {
      slot.classList.remove('filled', 'active-slot');
      slot.innerHTML = `
        <div class="slot-pos-label">${pos}</div>
        <div class="slot-empty-text">Empty</div>
      `;
    }
  });
}



// ---- SPIN ----
function spin() {
  if (state.spinning || state.done) return;
  if (getNeededPos().length === 0) return;

  state.spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('pickerSection').classList.remove('active');

  const display = document.getElementById('slotDisplay');
  display.classList.add('spinning');

  let ticks = 0;
  const maxTicks = 18;
  const interval = setInterval(() => {
    const randCombo = ALL_COMBOS[Math.floor(Math.random() * ALL_COMBOS.length)];
    const [dec, team] = randCombo.split('||');
    display.innerHTML = `<span class="slot-decade">${dec}</span><span style="color:var(--muted)">·</span><span class="slot-team">${team}</span>`;
    ticks++;
    if (ticks >= maxTicks) {
      clearInterval(interval);
      display.classList.remove('spinning');
      // Re-fetch needed positions fresh at the moment the spin resolves
      const currentNeeded = getNeededPos();
      let chosen = null;
      let tries = 0;
      while (!chosen && tries < 300) {
        const candidate = ALL_COMBOS[Math.floor(Math.random() * ALL_COMBOS.length)];
        const players = COMBO_INDEX[candidate];
        const hasFit = players.some(p => getEligiblePositions(p.pos, currentNeeded).length > 0);
        if (hasFit) chosen = candidate;
        tries++;
      }
      if (!chosen) chosen = ALL_COMBOS[0];
      state.currentCombo = chosen;
      const [d, t] = chosen.split('||');
      display.innerHTML = `<span class="slot-decade">${d}</span><span style="color:var(--muted)">·</span><span class="slot-team">${t}</span>`;
      state.spinning = false;
      showPicker(chosen);
    }
  }, 70);
}

// Ambiguous positions that can map to multiple standard slots
const AMBIG_POS_MAP = {
  'G':  ['PG', 'SG'],
  'F':  ['SF', 'PF'],
  'GF': ['PG', 'SG', 'SF', 'PF'],
  'FG': ['PG', 'SG', 'SF', 'PF'],
};

function getEligiblePositions(playerPos, needed) {
  const mapped = AMBIG_POS_MAP[playerPos];
  if (mapped) return needed.filter(p => mapped.includes(p));
  return needed.includes(playerPos) ? [playerPos] : [];
}

// Picker candidate list — populated each time showPicker runs so onclick
// handlers reference players by index, avoiding inline JSON issues.
let _pickerCandidates = [];

// ---- PICKER ----
function showPicker(combo) {
  const needed = getNeededPos();
  const players = COMBO_INDEX[combo].filter(p => getEligiblePositions(p.pos, needed).length > 0);
  _pickerCandidates = [...players].sort((a,b) => b.PPG - a.PPG);

  const [decade, team] = combo.split('||');
  document.getElementById('pickerHeader').innerHTML = `
    <span style="color:var(--accent2)">${decade}</span>
    <span style="color:var(--muted)"> · </span>
    <span style="color:var(--accent)">${team}</span>
    <span style="color:var(--muted)"> — pick one player</span>
  `;

  const grid = document.getElementById('playerGrid');
  grid.innerHTML = _pickerCandidates.map((p, idx) => {
    const eligPos = getEligiblePositions(p.pos, needed);
    const posDisplay = eligPos.join('/');

    if (eligPos.length === 1) {
      return `
        <div class="player-card" onclick="pickPlayerByIndex(${idx}, '${eligPos[0]}')">
          <div>
            <div class="player-pos">${posDisplay} · ${p.GP} GP</div>
            <div class="player-name">${p.name}</div>
            <div class="player-stats">
              <span class="stat-highlight">${p.PPG}</span> PPG ·
              <span class="stat-highlight">${p.RPG}</span> RPG ·
              <span class="stat-highlight">${p.APG}</span> APG ·
              ${p.SPG} SPG · ${p.BPG} BPG
            </div>
          </div>
          <button class="pick-btn">Draft</button>
        </div>
      `;
    } else {
      const slotBtns = eligPos.map(slot =>
        `<button class="pick-btn" style="margin-left:4px" onclick="event.stopPropagation();pickPlayerByIndex(${idx},'${slot}')">${slot}</button>`
      ).join('');
      return `
        <div class="player-card" style="cursor:default">
          <div>
            <div class="player-pos">${posDisplay} · ${p.GP} GP</div>
            <div class="player-name">${p.name}</div>
            <div class="player-stats">
              <span class="stat-highlight">${p.PPG}</span> PPG ·
              <span class="stat-highlight">${p.RPG}</span> RPG ·
              <span class="stat-highlight">${p.APG}</span> APG ·
              ${p.SPG} SPG · ${p.BPG} BPG
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
            <div style="font-size:0.6rem;color:var(--muted);letter-spacing:0.1em">SLOT:</div>
            ${slotBtns}
          </div>
        </div>
      `;
    }
  }).join('');

  document.getElementById('pickerSection').classList.add('active');

  const roundsLeft = 5 - state.round - 1;
  document.getElementById('roundsLeft').textContent = `${roundsLeft} ${roundsLeft === 1 ? 'pick' : 'picks'} remaining after this`;
}

function pickPlayerByIndex(idx, pos) {
  pickPlayer(_pickerCandidates[idx], pos);
}

function pickPlayer(player, pos) {
  const needed = getNeededPos();
  if (!needed.includes(pos)) {
    pos = needed[0];
  }

  state.picks.push({ pos, player });
  state.round++;
  document.getElementById('pickerSection').classList.remove('active');
  updateRoster();

  const remaining = getNeededPos();
  if (remaining.length === 0) {
    document.getElementById('spinBtn').disabled = true;
    document.getElementById('simulateBtn').disabled = false;
    document.getElementById('roundsLeft').textContent = 'Roster complete — simulate!';
    const spinLabel = document.getElementById('slotSection').querySelector('.spin-label');
    if (spinLabel) spinLabel.textContent = '▸ All positions filled';
  } else {
    document.getElementById('spinBtn').disabled = false;
    const r = remaining.length;
    document.getElementById('roundsLeft').textContent = `${r} ${r===1?'pick':'picks'} remaining`;
  }
}

// ---- SIMULATE ----
function simulate() {
  // Score each category across the 5 players
  const team = state.picks.map(p => p.player);

  const totPPG = team.reduce((s, p) => s + p.PPG, 0);
  const totRPG = team.reduce((s, p) => s + p.RPG, 0);
  const totAPG = team.reduce((s, p) => s + p.APG, 0);
  const totSPG = team.reduce((s, p) => s + p.SPG, 0);
  const totBPG = team.reduce((s, p) => s + p.BPG, 0);

  // Thresholds for a perfect season (calibrated from data)
  const THRESHOLDS = {
    PPG: { perfect: 90, good: 55 },
    RPG: { perfect: 40, good: 18 },
    APG: { perfect: 35, good: 10 },
    SPG: { perfect: 7, good: 3.0 },
    BPG: { perfect: 5, good: 3.5 },
  };

  const scores = {
    PPG: totPPG,
    RPG: totRPG,
    APG: totAPG,
    SPG: totSPG,
    BPG: totBPG,
  };

  // Each category scores 0-100 toward winning
  function catScore(val, thr) {
    if (val >= thr.perfect) return 100;
    if (val <= 0) return 0;
    return Math.round((val / thr.perfect) * 100);
  }

  const catScores = {
    PPG: catScore(totPPG, THRESHOLDS.PPG),
    RPG: catScore(totRPG, THRESHOLDS.RPG),
    APG: catScore(totAPG, THRESHOLDS.APG),
    SPG: catScore(totSPG, THRESHOLDS.SPG),
    BPG: catScore(totBPG, THRESHOLDS.BPG),
  };

  // Win pct = avg of category scores, all must be >= threshold to go 82-0
  const allPerfect = Object.entries(catScores).every(([cat, s]) => s >= 100);
  const avgScore = Object.values(catScores).reduce((a,b)=>a+b,0) / 5;

  let wins, losses;
  if (allPerfect) {
    wins = 82; losses = 0;
  } else {
    // Bottleneck: weakest category caps overall
    const minScore = Math.min(...Object.values(catScores));
    // Add some noise
    const noise = (Math.random() - 0.5) * 8;
    const effectiveScore = Math.min(avgScore * 0.6 + minScore * 0.4 + noise, 100);
    wins = Math.min(82, Math.max(0, Math.round((effectiveScore / 100) * 82)));
    losses = 82 - wins;
  }

  showResult(wins, losses, catScores, scores, team);
}

function showResult(wins, losses, catScores, rawScores, team) {
  const overlay = document.getElementById('resultOverlay');
  const record = document.getElementById('resultRecord');
  const msg = document.getElementById('resultMessage');
  const statsEl = document.getElementById('simStats');
  const teamEl = document.getElementById('resultTeam');

  record.textContent = `${wins}-${losses}`;
  record.className = 'result-record';
  if (wins === 82) {
    record.classList.add('perfect');
    msg.textContent = 'Perfect. Your DPBL all-time squad ran the table. Unbeaten. Untouched.';
    launchConfetti();
  } else if (wins >= 70) {
    record.classList.add('good');
    msg.textContent = `${wins} wins. Historic season — but the championship slipped away.`;
  } else if (wins >= 55) {
    record.classList.add('good');
    msg.textContent = `Solid squad, but not quite legendary. Can you build a better roster?`;
  } else {
    record.classList.add('bad');
    msg.textContent = `Rough one. Check your weakest stats — that's where the losses come from.`;
  }

  // Stat bars
  const CATS = ['PPG','RPG','APG','SPG','BPG'];
  const PERFECT_VALS = { PPG: 72, RPG: 25, APG: 16, SPG: 4.2, BPG: 5.5 };
  statsEl.innerHTML = CATS.map(cat => {
    const pct = Math.min(100, catScores[cat]);
    const cls = pct >= 100 ? 'ok' : pct >= 65 ? 'warn' : 'fail';
    return `
      <div class="stat-bar-row">
        <div class="stat-bar-label">${cat}</div>
        <div class="stat-bar-track">
          <div class="stat-bar-fill ${cls}" style="width:0%" data-target="${pct}%"></div>
        </div>
        <div class="stat-bar-val">${rawScores[cat].toFixed(1)}</div>
      </div>
    `;
  }).join('');

  teamEl.innerHTML = team.map(p => `
    <div class="result-player">
      <div class="pos-label">${p.pos}</div>
      <div class="name">${p.name.split(' ').map((w,i)=>i===0?w[0]+'.':w).join(' ')}</div>
      <div>${p.PPG}pts</div>
    </div>
  `).join('');

  overlay.classList.add('active');

  // Animate bars
  setTimeout(() => {
    document.querySelectorAll('.stat-bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.target;
    });
  }, 100);
}

function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  const colors = ['#f5c518','#e8501a','#1db954','#ffffff','#ff6b6b'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (Math.random() * 8 + 4) + 'px';
    piece.style.height = (Math.random() * 8 + 4) + 'px';
    piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
    piece.style.animationDelay = (Math.random() * 1.5) + 's';
    container.appendChild(piece);
    piece.addEventListener('animationend', () => piece.remove());
  }
}

function resetGame() {
  state = { round: 0, picks: [], currentCombo: null, spinning: false, done: false };
  document.getElementById('resultOverlay').classList.remove('active');
  document.getElementById('confettiContainer').innerHTML = '';
  document.getElementById('pickerSection').classList.remove('active');
  document.getElementById('simulateBtn').disabled = true;
  document.getElementById('spinBtn').disabled = false;
  document.getElementById('roundsLeft').textContent = '5 picks remaining';
  document.getElementById('slotDisplay').innerHTML = `<span class="slot-decade">—</span><span style="color:var(--muted)">·</span><span class="slot-team">—</span>`;
  document.getElementById('slotSection').querySelector('.spin-label').textContent = '▸ Roll the Randomizer';
  initRoster();
  updateRoster();
}

// ---- BOOT ----
initRoster();
</script>
